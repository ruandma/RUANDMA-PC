<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - RUANDMA PC</title>
    <link rel="shortcut icon" href="imagens/logomarca/logomarca.png" type="image/png">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="loja.css">
    <link rel="stylesheet" href="sobre-nos.css">
    <link rel="stylesheet" href="contato.css">
    <style>
        .form-registrar {
            background: var(--background-light);
            padding: 32px 24px;
            border-radius: 10px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
            max-width: 400px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-registrar h1 {
            color: var(--primary-color);
            font-size: 2em;
            text-align: center;
            margin-bottom: 10px;
        }
        .form-registrar label {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-registrar input {
            background-color: #2b2b2b;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .form-registrar button {
            background-color: var(--primary-color);
            color: #232526;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .form-registrar button:hover {
            background-color: #00cc77;
        }
        .form-registrar .login-link {
            text-align: center;
            margin-top: 10px;
        }
        .form-registrar .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .form-registrar .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header role="banner">
        <nav role="navigation" aria-label="Menu principal">
            <div class="logo" role="button" aria-label="Abrir carrinho" tabindex="0">
                <img src="imagens/logomarca/logomarca.png" alt="RUANDMA PC">
                <div class="cart-count" id="cart-count">0</div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="loja.html">Loja</a></li>
                <li><a href="sobre-nos.html">Sobre nós</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
            <div class="profile" style="position: relative;">
                <img src="imagens/perfil/perfil.png" alt="Foto de Perfil" class="profile-img" onerror="this.src='imagens/perfil/perfil.png'">
                <!-- Balão de opções de conta -->
                <div class="profile-dropdown" id="profile-dropdown" style="display: none;">
                    <ul>
                        <li><a href="registrar.html" class="profile-action" id="btn-registrar"><i class="fas fa-user-plus"></i> Registrar</a></li>
                        <li><a href="login.html" class="profile-action" id="btn-logar"><i class="fas fa-sign-in-alt"></i> Logar</a></li>
                    </ul>
                </div>
            </div>
            <div class="menu-toggle" id="menu-toggle" aria-label="Abrir menu" aria-expanded="false">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <!-- Formulário de Registro -->
    <main>
        <form class="form-registrar" autocomplete="off">
            <h1>Registrar</h1>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required autocomplete="off">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required autocomplete="off">

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required autocomplete="off">

            <button type="submit">Criar Conta</button>
            <div class="login-link">
                Já tem uma conta? <a href="login.html">Entrar</a>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <footer role="contentinfo">
        <div class="footer-content">
            <ul>
                <li>&copy; 2025 RUANDMA PC - Todos os direitos reservados.</li>
                <li>CNPJ: 00.000.000/0001-00</li>
                <li>Contato: <a href="mailto:contato@ruandmapc.com">contato@ruandmapc.com</a></li>
                <li><a href="/privacidade">Política de Privacidade</a> | <a href="/termos">Termos de Uso</a></li>
            </ul>
        </div>
    </footer>

    <script src="index.js" defer></script>
    <script src="index.js" defer></script> 
    <script src="loja.js" defer></script> <!-- Se necessário -->  
    <script src="shared.js" defer></script>
</body>
</html>
